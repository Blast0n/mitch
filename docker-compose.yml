services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: twitch-sender:latest
    container_name: twitch-sender
    restart: unless-stopped
    # .env читается dotenv-ом внутри Node из /app/.env (через bind-mount репозитория).
    # env_file из compose НЕ используем — он интерполирует $ в bcrypt-хеше.
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
