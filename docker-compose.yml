services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: twitch-sender:latest
    container_name: twitch-sender
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
